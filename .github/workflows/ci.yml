name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  CARGO_TERM_COLOR: always
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "stable"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Stages are defined in scripts/ci.sh (single source of truth) so this
      # workflow and `just check` run the identical commands. Each stage is a
      # separate step purely for failure-locating in the Actions UI.
      - name: Format
        run: ./scripts/ci.sh fmt
      - name: Scripts
        run: ./scripts/ci.sh scripts
      - name: Clippy
        run: ./scripts/ci.sh clippy
      - name: Test
        run: ./scripts/ci.sh test
      # PTY smoke tests run isolated (no other test binaries competing) so they
      # stay fast and reliable; timeout-minutes backstops a stall.
      - name: PTY smoke
        run: ./scripts/ci.sh pty
        timeout-minutes: 5
      - name: Build release
        run: ./scripts/ci.sh build
